<!DOCTYPE html>
<html>
<head>
<title>Nhà phân phối Thụy Lương</title>
</head>
<body>
<iframe src="https://www.appsheet.com/start/8edda899-7faa-450c-9f8d-2501ecb409ad"
width="100%"
height="100%"
allowfullscreen="true"
style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;"></iframe>
<script>
window.onload = function() {
document.querySelector('iframe').requestFullscreen().catch((err) => {
console.error(`Error attempting to enable full-screen mode: ${err.message}`);
});
};
</script>
</body>
</html>
